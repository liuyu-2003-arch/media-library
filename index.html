<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FilmVault</title>
  <link rel="icon" href="https://pub-53636cd060c94f6190dae2c201d6c7c2.r2.dev/favicon.svg">
  <style>
    :root {
      /* TMDB 风格 - 深色主题 */
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-card: #21262d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-tertiary: #6e7681;
      --border-color: rgba(240,246,252,0.1);
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --tag-movie: #58a6ff;
      --tag-tv: #a371f7;
      --tag-resource: #3fb950;
      --shadow: 0 4px 20px rgba(0,0,0,0.4);
      --shadow-hover: 0 8px 30px rgba(88,166,255,0.15);
      --rating-color: #f5c518;
    }

    [data-theme="dark"] {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: rgba(30, 30, 40, 0.7);
      --text-primary: #f0f0f5;
      --text-secondary: #a0a0b0;
      --text-tertiary: #606070;
      --border-color: rgba(255,255,255,0.08);
      --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --accent-solid: #667eea;
      --accent-hover: #7c8ff5;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --shadow-hover: 0 12px 48px rgba(102, 126, 234, 0.25);
      --rating-color: #ffd700;
      --glass-bg: rgba(255,255,255,0.03);
      --glass-border: rgba(255,255,255,0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
      background-image: 
        radial-gradient(ellipse at 20% 0%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(118, 75, 162, 0.1) 0%, transparent 50%);
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(20,20,30,0.9) 0%, var(--bg-primary) 100%);
      backdrop-filter: blur(20px);
      pointer-events: none;
      z-index: -1;
    }

    /* 顶部导航栏 */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,15,0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--bg-secondary);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      gap: 16px;
      transition: background 0.3s ease;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text-primary);
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .logo-text {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background: linear-gradient(135deg, var(--text-primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .filters {
      display: flex;
      gap: 6px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .filters.search-active {
      opacity: 1;
      transform: translateX(-230px);
      pointer-events: auto;
    }

    .filter-btn {
      padding: 8px 16px;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(88,166,255,0.1);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .filter-btn.filtering {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .search-wrapper {
      position: relative; overflow: visible;
    }

    .search-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.25s ease;
    }

    .search-icon:hover {
      border-color: var(--accent);
    }

    .search-expanded {
      position: absolute;
      right: 50px;
      top: 50%;
      transform: translateY(-50%) scale(0.9);
      width: 180px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
    }

    .search-expanded.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(-50%) scale(1);
    }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 8px 12px;
      gap: 8px;
      box-shadow: var(--shadow);
    }

    .filter-dropdown-wrapper {
      position: relative;
    }

    .filter-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 8px;
      min-width: 100px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
      transition: all 0.2s ease;
    }

    .filter-dropdown.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .type-dropdown {
      left: 0;
    }

    .genre-dropdown {
      left: 0;
    }

    .year-dropdown {
      left: 0;
    }

    .filter-tags {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .filter-tag {
      padding: 8px 16px;
      background: transparent;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: left;
      white-space: nowrap;
    }
    .filter-tag:hover {
      background: var(--bg-card);
      color: var(--text-primary);
    }
    .filter-tag.active {
      background: var(--accent);
      color: #fff;
    }

    .search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 0.85rem;
    }

    .search-box input::placeholder {
      color: var(--text-tertiary);
    }

    .search-close {
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 0.75rem;
      transition: color 0.2s;
    }

    .search-close:hover {
      color: var(--text-primary);
    }

    /* 主题切换 */
    .theme-toggle {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.25s ease;
    }

    /* 影视网格 */
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      grid-auto-rows: minmax(0, auto);
      gap: 16px;
      padding: 20px;
      padding-bottom: 70px;
      max-width: 1600px;
      margin: 0 auto;
      align-items: start;
    }

    @media (min-width: 640px) {
      .movies-grid {
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
        grid-auto-rows: minmax(0, auto);
        gap: 20px;
        padding: 24px;
        padding-bottom: 70px;
        align-items: start;
      }
    }

    /* 影视卡片 */
    .movie-card {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .movie-card:hover {
      border-color: rgba(102, 126, 234, 0.5);
      box-shadow: 0 0 30px rgba(102, 126, 234, 0.3), 0 20px 60px rgba(0,0,0,0.4);
      transform: translateY(-8px) scale(1.02);
    }

    .movie-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
    }

    .movie-year {
      color: var(--text-secondary);
    }

    .movie-rating .star {
      color: var(--rating-color);
    }
    .movie-rating {
      color: var(--rating-color);
      font-weight: 600;
    }

    /* 标签 - 左上角 */
    .movie-tags {
      position: absolute;
      top: 8px;
      left: 8px;
      display: flex;
      gap: 4px;
    }

    .tag {
      padding: 2px 7px;
      border-radius: 8px;
      font-size: 0.58rem;
      font-weight: 500;
      color: #fff;
    }

    .tag-movie { background: var(--tag-movie); }
    .tag-tv { background: var(--tag-tv); }
    .tag-resource { background: var(--tag-resource); }

    /* 评分徽章 */
    .movie-rating-badge {
      position: absolute;
      bottom: 40px;
      left: 8px;
      background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(30,30,50,0.9));
      backdrop-filter: blur(8px);
      color: var(--rating-color);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 4px;
      border: 1px solid rgba(255,215,0,0.3);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .movie-rating-badge .star {
      color: var(--rating-color);
    }

    /* 年份徽章 - 固定在右上角，与标签对齐 */
    .movie-year-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(30,30,50,0.9));
      backdrop-filter: blur(8px);
      color: #fff;
      padding: 2px 7px;
      border-radius: 8px;
      font-size: 0.58rem;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    /* 电影标题 - 固定高度统一对齐 */
    .movie-card-title {
      padding: 10px 6px;
      font-size: 0.75rem;
      color: var(--text-primary);
      text-align: center;
      line-height: 1.3;
      height: 2.6em;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 统计 */
    .stats {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 50px;
      text-align: center;
      padding: 12px;
      color: var(--text-tertiary);
      font-size: 0.72rem;
      background: var(--bg-secondary);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border-color);
      z-index: 50;
    }

    /* 空状态 */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 14px;
      opacity: 0.3;
    }

    .empty-state h2 {
      font-size: 0.95rem;
      font-weight: 400;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }

    /* ========== 详情页 ========== */
    .detail-page {
      display: none;
      min-height: 100vh;
    }

    .detail-page.active {
      display: block;
    }

    .detail-header {
      position: relative; overflow: visible;
      padding: 60px 24px 24px;
      text-align: center;
    }

    .detail-back {
      position: absolute;
      left: 20px;
      top: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 8px 14px;
      border-radius: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      transition: all 0.25s ease;
    }

    .detail-back:hover {
      border-color: var(--accent);
      color: var(--text-primary);
    }

    .detail-share {
      position: absolute;
      right: 50px;
      top: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      font-size: 0.85rem;
      padding: 8px 14px;
      border-radius: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .detail-share:hover {
      border-color: var(--accent);
      color: var(--text-primary);
    }

    .detail-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    .detail-main {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 28px;
      margin-bottom: 28px;
    }

    @media (max-width: 600px) {
      .detail-main {
        grid-template-columns: 1fr;
        text-align: center;
      }
    }

    .detail-poster {
      width: 100%;
      border-radius: 12px;
      aspect-ratio: 2/3;
      object-fit: cover;
      box-shadow: var(--shadow);
    }

    .detail-info {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .detail-title {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .detail-title-en {
      font-size: 0.95rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
      font-weight: 400;
    }

    .detail-meta {
      display: flex;
      gap: 16px;
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .detail-rating {
      color: #f4a523;
      font-weight: 500;
    }

    .detail-genre {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .detail-genre-tag {
      padding: 4px 12px;
      background: rgba(88, 166, 255, 0.1);
      border: 1px solid rgba(88, 166, 255, 0.3);
      border-radius: 12px;
      font-size: 0.75rem;
      color: var(--accent-solid, #58a6ff);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .detail-genre-tag:hover {
      background: rgba(88, 166, 255, 0.2);
      border-color: rgba(88, 166, 255, 0.5);
    }

    .detail-intro {
      color: var(--text-secondary);
      line-height: 1.7;
      font-size: 0.9rem;
    }

    .season-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .season-tag {
      padding: 6px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }

    .season-tag:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .season-tag.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .detail-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
      margin-bottom: 28px;
    }

    .detail-link {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 0.8rem;
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .detail-link-douban {
      background: rgba(0, 180, 60, 0.1);
      border: 1px solid rgba(0, 180, 60, 0.25);
      color: #00b43c;
    }

    .detail-link-douban:hover {
      background: rgba(0, 180, 60, 0.2);
    }

    .detail-link-tmdb {
      background: rgba(135, 163, 232, 0.1);
      border: 1px solid rgba(135, 163, 232, 0.25);
      color: #87a3e8;
    }

    .detail-link-tmdb:hover {
      background: rgba(135, 163, 232, 0.2);
    }

    .detail-link-imdb {
      background: rgba(244, 203, 87, 0.1);
      border: 1px solid rgba(244, 203, 87, 0.25);
      color: #d4a835;
    }

    .detail-link-imdb:hover {
      background: rgba(244, 203, 87, 0.2);
    }

    .detail-section {
      margin-bottom: 24px;
    }

    .detail-section-title {
      font-size: 0.7rem;
      color: var(--text-tertiary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .resource-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .resource-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 10px;
      color: #10b981;
      text-decoration: none;
      font-size: 0.82rem;
      transition: all 0.25s ease;
      overflow: hidden;
    }

    .resource-link:hover {
      background: rgba(16, 185, 129, 0.15);
      border-color: rgba(16, 185, 129, 0.35);
    }

    .resource-url {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .no-resource {
      padding: 16px;
      background: var(--bg-card);
      border: 1px dashed var(--border-color);
      border-radius: 10px;
      color: var(--text-tertiary);
      font-size: 0.8rem;
      text-align: center;
    }

    .resources-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .resources-count {
      font-size: 0.75rem;
      color: var(--text-tertiary);
    }

    .btn-refresh {
      padding: 6px 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-refresh:hover {
      background: var(--accent-hover);
    }

    .resource-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .btn-delete {
      padding: 4px 8px;
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 4px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-delete:hover {
      background: #ef4444;
      color: #fff;
    }

    /* 详情页扩展 */
    .detail-meta-row {
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .detail-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .detail-meta-item .label {
      color: var(--text-tertiary);
    }

    .detail-director {
      margin-bottom: 16px;
    }

    .detail-director-label {
      font-size: 0.7rem;
      color: var(--text-tertiary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .detail-director-name {
      font-size: 0.9rem;
      color: var(--text-primary);
    }

    .detail-cast {
      margin-bottom: 20px;
    }

    .detail-cast-label {
      font-size: 0.7rem;
      color: var(--text-tertiary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .detail-cast-list {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: thin;
    }

    .detail-cast-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 60px;
      text-align: center;
    }

    .detail-cast-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      margin-bottom: 6px;
      overflow: hidden;
    }

    .detail-cast-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .detail-cast-name {
      font-size: 0.7rem;
      color: var(--text-secondary);
      max-width: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .detail-cast-inline {
      margin-top: 16px;
    }

    .detail-crew-inline {
      margin-top: 10px;
    }

    .detail-crew-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 12px;
    }

    @media (min-width: 640px) {
      .detail-crew-list {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 0 20px;
      }
    }

    .detail-crew-item {
      display: flex;
      flex-direction: row;
      gap: 6px;
      align-items: baseline;
      white-space: normal;
      word-break: break-all;
    }

    .detail-crew-role {
      color: var(--text-tertiary);
      font-size: 0.85rem;
    }

    .detail-crew-name {
      color: var(--text-primary);
      font-size: 0.9rem;
    }

    .detail-crew-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      margin-bottom: 4px;
      overflow: hidden;
      cursor: pointer;
      position: relative; overflow: visible;
    }
    .detail-crew-avatar:hover::after {
      content: attr(data-name);
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      color: #fff;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.7rem;
      white-space: nowrap;
      z-index: 100;
      pointer-events: none;
    }

    .detail-crew-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .detail-crew-role {
      font-size: 0.6rem;
      color: var(--text-tertiary);
      margin-bottom: 2px;
    }

    .detail-crew-name {
      font-size: 0.65rem;
      color: var(--text-secondary);
      max-width: 50px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .detail-divider {
      height: 1px;
      background: var(--border-color);
      margin: 20px 0;
    }

    .detail-ratings {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .detail-rating-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 0.8rem;
    }

    .detail-rating-item .source {
      color: var(--text-tertiary);
    }

    .detail-rating-item .value {
      font-weight: 600;
    }

    .detail-rating-item.douban .value { color: #00b43c; }
    .detail-rating-item.tmdb .value { color: #87a3e8; }
    .detail-rating-item.imdb .value { color: #f4a523; }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

    /* Toast */
    .toast {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-card);
      border: 1px solid var(--accent);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      color: var(--text-primary);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 2000;
      box-shadow: var(--shadow);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 添加电影弹窗 */
    .add-modal {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .add-modal.active {
      display: flex;
    }

    .add-modal-content {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
    }

    .add-modal-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .add-modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text-tertiary);
      font-size: 1.2rem;
      cursor: pointer;
    }

    .add-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .add-form input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-form input:focus {
      border-color: var(--accent);
    }

    .add-form input::placeholder {
      color: var(--text-tertiary);
    }

    .add-form button {
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-form button:hover {
      background: var(--accent-hover);
    }

    .add-form button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <!-- 首页 -->
  <div class="home-page" id="homePage">
    <div class="topbar">
      <div class="topbar-left">
        <a href="/" class="logo" onclick="goHome(); return false;">
          <span class="logo-icon">▶</span>
          <span class="logo-text">Film<span style="color: #f093fb">Vault</span></span>
        </a>
      </div>
      <div class="topbar-right">
        <div class="filters" id="filters">
          <div class="filter-dropdown-wrapper">
            <button class="filter-btn" id="typeFilterBtn" onclick="toggleTypeDropdown()">类型 ▾</button>
            <div class="filter-dropdown type-dropdown" id="typeDropdown">
              <div class="filter-tags">
                <span class="filter-tag" onclick="filterByType('all')">全部</span>
                <span class="filter-tag" onclick="filterByType('movie')">电影</span>
                <span class="filter-tag" onclick="filterByType('tv')">剧集</span>
              </div>
            </div>
          </div>
          <div class="filter-dropdown-wrapper">
            <button class="filter-btn" id="genreFilterBtn" onclick="toggleGenreDropdown()">标签 ▾</button>
            <div class="filter-dropdown genre-dropdown" id="genreDropdown">
              <div class="filter-tags" id="filterTags"></div>
            </div>
          </div>
          <div class="filter-dropdown-wrapper">
            <button class="filter-btn" id="yearFilterBtn" onclick="toggleYearDropdown()">年份 ▾</button>
            <div class="filter-dropdown year-dropdown" id="yearDropdown">
              <div class="filter-tags" id="filterYears"></div>
            </div>
          </div>
        </div>
        <div class="search-wrapper">
          <div class="search-icon" onclick="expandSearch()">🔍</div>
          <div class="search-expanded" id="searchExpanded">
            <div class="search-box">
              <span>🔍</span>
              <input type="text" id="searchInput" placeholder="搜索..." oninput="renderMovies()">
              <span class="search-close" onclick="collapseSearch()">✕</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="movies-grid" id="moviesGrid"></div>
    <div class="stats" id="stats"></div>
  </div>

  <!-- 详情页 -->
  <div class="detail-page" id="detailPage">
    <div class="detail-header">
      <a href="/" class="detail-back" onclick="goHome(); return false;">← 返回</a>
      <button class="detail-share" onclick="shareMovie()">分享 ↗</button>
    </div>
    <div class="detail-content">
      <div class="detail-main">
        <img class="detail-poster" id="detailPoster" src="" alt="">
        <div class="detail-info">
          <h1 class="detail-title" id="detailTitle"></h1>
          <div class="detail-title-en" id="detailTitleEn"></div>
          <div class="detail-meta-row">
            <div class="detail-meta-item">
              <span class="label">上映</span>
              <span id="detailYear"></span>
            </div>
            <div class="detail-meta-item">
              <span class="label">地区</span>
              <span id="detailRegion"></span>
            </div>
          </div>
          <div class="detail-ratings" id="detailRatings"></div>
          <div class="detail-crew-inline" id="detailCrewInline" style="display:none;">
            <div class="detail-crew-list" id="detailCrewList"></div>
          </div>
          <div class="detail-links" id="detailLinks"></div>
          <div class="detail-genre" id="detailGenreTags"></div>
        </div>
      </div>
      
      <div class="detail-divider"></div>
      
      <div class="detail-section" id="seasonSelectorSection" style="display:none;">
        <div class="season-selector" id="seasonSelector"></div>
      </div>
      
      <div class="detail-section">
        <div class="detail-section-title">剧情简介</div>
        <p class="detail-intro" id="detailFullIntro" style="line-height:1.8;"></p>
      </div>
      
      <div class="detail-section">
        <div class="detail-section-title">资源链接</div>
        <div class="resource-links" id="detailResources"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- 添加电影弹窗 -->
  <div class="add-modal" id="addModal">
    <div class="add-modal-content">
      <div class="add-modal-title">添加电影</div>
      <form class="add-form" onsubmit="submitAddMovie(event)">
        <input type="url" id="doubanUrlInput" placeholder="豆瓣链接" required>
        <input type="text" id="movieNameInput" placeholder="电影名称（用于搜索TMDB）" required>
        <button type="submit" id="addSubmitBtn">添加到影视库</button>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = 'https://media-library-api.jemchmi.workers.dev';
    let movies = [];
    let currentFilter = 'all';
    let currentMovie = null;

    // 年份颜色映射
    const yearColors = {
      '2026': { bg: 'rgba(102, 126, 234, 0.9)', border: 'rgba(102, 126, 234, 0.5)' },
      '2025': { bg: 'rgba(16, 185, 129, 0.9)', border: 'rgba(16, 185, 129, 0.5)' },
      '2024': { bg: 'rgba(245, 158, 11, 0.9)', border: 'rgba(245, 158, 11, 0.5)' },
      '2023': { bg: 'rgba(239, 68, 68, 0.9)', border: 'rgba(239, 68, 68, 0.5)' },
    };
    function getYearColor(year) {
      return yearColors[year] || { bg: 'rgba(100, 100, 100, 0.9)', border: 'rgba(100, 100, 100, 0.5)' };
    }

    // Genre 中文翻译
    const genreCN = {
      'Horror': '恐怖', 'Comedy': '喜剧', 'Adventure': '冒险', 'Animation': '动画',
      'Family': '家庭', 'Thriller': '惊悚', 'Science Fiction': '科幻', 'Action': '动作',
      'Drama': '剧情', 'Romance': '爱情', 'Fantasy': '奇幻', 'Mystery': '悬疑',
      'Crime': '犯罪', 'Documentary': '纪录片', 'Music': '音乐', 'War': '战争',
      'History': '历史', 'Western': '西部', 'Musical': '歌舞', 'Sport': '运动',
      'Biopic': '传记', 'Animation / Comedy / Family': '动画 / 喜剧 / 家庭',
      'Horror / Comedy / Adventure': '恐怖 / 喜剧 / 冒险',
      'Horror / Comedy': '恐怖 / 喜剧',
      'Horror / Thriller': '恐怖 / 惊悚',
      'Science Fiction / Action / Adventure': '科幻 / 动作 / 冒险',
      'Action / Thriller': '动作 / 惊悚',
    };
    function translateGenre(g) { return genreCN[g] || g; }

    // 中文标题映射表
    const titleCNMap = {
      'Scream 7': '惊声尖叫7',
      'Bugonia': '拯救地球',
      'They Will Kill You': '杀的就是你',
      'The Housemaid': '家弑服务',
      'A Knight of the Seven Kingdoms': '七王国的骑士',
      'The Flash': '闪电侠',
      'Avatar 3': '阿凡达3',
      'Zootopia 2': '疯狂动物城2',
      'Ready or Not 2': '准备好了没2',
    };
    function getChineseTitle(m) {
      return titleCNMap[m.title] || m.title_cn || m.titleCn || m.title;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function expandSearch() {
      document.getElementById('searchExpanded').classList.add('active');
      document.querySelector('.search-icon').style.display = 'none';
      document.getElementById('filters').classList.add('search-active');
    }

    function collapseSearch() {
      document.getElementById('searchExpanded').classList.remove('active');
      document.getElementById('filters').classList.remove('search-active');
      document.querySelector('.search-icon').style.display = 'flex';
      renderMovies();
      window.scrollTo(0, 0);
    }

    function toggleTypeDropdown() {
      const dropdown = document.getElementById('typeDropdown');
      const genreDropdown = document.getElementById('genreDropdown');
      const yearDropdown = document.getElementById('yearDropdown');
      genreDropdown.classList.remove('active');
      yearDropdown.classList.remove('active');
      dropdown.classList.toggle('active');
    }

    function toggleGenreDropdown() {
      const dropdown = document.getElementById('genreDropdown');
      const typeDropdown = document.getElementById('typeDropdown');
      const yearDropdown = document.getElementById('yearDropdown');
      typeDropdown.classList.remove('active');
      yearDropdown.classList.remove('active');
      dropdown.classList.toggle('active');
    }

    function toggleYearDropdown() {
      const dropdown = document.getElementById('yearDropdown');
      const typeDropdown = document.getElementById('typeDropdown');
      const genreDropdown = document.getElementById('genreDropdown');
      typeDropdown.classList.remove('active');
      genreDropdown.classList.remove('active');
      dropdown.classList.toggle('active');
    }

    function filterByType(type) {
      window.currentType = type;
      const typeBtn = document.getElementById('typeFilterBtn');
      if (type === 'all') {
        typeBtn.innerHTML = '类型 ▾';
        typeBtn.classList.remove('filtering');
      } else if (type === 'movie') {
        typeBtn.innerHTML = '电影 ▾';
        typeBtn.classList.add('filtering');
      } else {
        typeBtn.innerHTML = '剧集 ▾';
        typeBtn.classList.add('filtering');
      }
      document.getElementById('typeDropdown').classList.remove('active');
      renderMovies();
    }

    function filterByGenre(genre) {
      window.currentGenre = genre;
      const genreBtn = document.getElementById('genreFilterBtn');
      if (genre === 'all') {
        genreBtn.innerHTML = '标签 ▾';
        genreBtn.classList.remove('filtering');
      } else {
        genreBtn.innerHTML = translateGenre(genre) + ' ▾';
        genreBtn.classList.add('filtering');
      }
      document.getElementById('genreDropdown').classList.remove('active');
      if (document.getElementById('detailPage').classList.contains('active')) {
        goHome();
      }
      renderMovies();
    }

    function filterByYear(year) {
      window.currentYear = year;
      const yearBtn = document.getElementById('yearFilterBtn');
      if (year === 'all') {
        yearBtn.innerHTML = '年份 ▾';
        yearBtn.classList.remove('filtering');
      } else {
        yearBtn.innerHTML = year + ' ▾';
        yearBtn.classList.add('filtering');
      }
      document.getElementById('yearDropdown').classList.remove('active');
      renderMovies();
    }

    function clearAllFilters() {
      window.currentType = 'all';
      window.currentGenre = 'all';
      window.currentYear = 'all';
      document.getElementById('typeFilterBtn').innerHTML = '类型 ▾';
      document.getElementById('typeFilterBtn').classList.remove('filtering');
      document.getElementById('genreFilterBtn').innerHTML = '标签 ▾';
      document.getElementById('genreFilterBtn').classList.remove('filtering');
      document.getElementById('yearFilterBtn').innerHTML = '年份 ▾';
      document.getElementById('yearFilterBtn').classList.remove('filtering');
      document.getElementById('searchInput').value = '';
      renderMovies();
    }

    function goHome() {
      clearAllFilters();
      document.getElementById('homePage').style.display = 'block';
      document.getElementById('detailPage').classList.remove('active');
      history.pushState(null, '', '/');
      window.scrollTo(0, 0);
    }

    async function loadMovies() {
      try {
        const response = await fetch(`${API_BASE}/api/movies`);
        const data = await response.json();
        movies = data.movies || [];
        renderMovies();
        populateFilters();
      } catch (e) {
        console.error('加载数据失败:', e);
      }
    }

    function populateFilters() {
      const genres = new Set();
      const years = new Set();
      movies.forEach(m => {
        if (m.genre) {
          m.genre.split(/[,/]/).forEach(g => {
            const trimmed = g.trim();
            if (trimmed) genres.add(trimmed);
          });
        }
        if (m.year) years.add(m.year);
      });

      const filterTags = document.getElementById('filterTags');
      filterTags.innerHTML = `<span class="filter-tag" onclick="filterByGenre('all')">全部</span>` + 
        Array.from(genres).map(g => {
          const cn = translateGenre(g);
          return `<span class="filter-tag" onclick="filterByGenre('${g}')">${cn}</span>`;
        }).join('');

      const filterYears = document.getElementById('filterYears');
      filterYears.innerHTML = `<span class="filter-tag" onclick="filterByYear('all')">全部</span>` +
        Array.from(years).sort().reverse().map(y => {
          return `<span class="filter-tag" onclick="filterByYear('${y}')">${y}</span>`;
        }).join('');
    }

    function clearFilters() {
      clearAllFilters();
    }

    function renderMovies() {
      const grid = document.getElementById('moviesGrid');
      const search = document.getElementById('searchInput').value.toLowerCase();
      
      // 初始化筛选状态
      if (!window.currentType) window.currentType = 'all';
      if (!window.currentGenre) window.currentGenre = 'all';
      if (!window.currentYear) window.currentYear = 'all';
      
      let filtered = movies.filter(m => {
        // 类型筛选
        if (window.currentType !== 'all' && m.type !== window.currentType) return false;
        // 标签筛选
        if (window.currentGenre !== 'all' && !m.genre.includes(window.currentGenre)) return false;
        // 年份筛选
        if (window.currentYear !== 'all' && m.year !== window.currentYear) return false;
        // 搜索
        if (search) {
          const chineseTitle = getChineseTitle(m);
          const englishTitle = m.title || '';
          if (!chineseTitle.toLowerCase().includes(search) && !englishTitle.toLowerCase().includes(search)) {
            return false;
          }
        }
        return true;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🎬</div>
            <h2>暂无内容</h2>
            <p>发送豆瓣链接给 Coraline 添加影视</p>
          </div>
        `;
        document.getElementById('stats').textContent = '';
        return;
      }

      grid.innerHTML = filtered.map(m => `
        <a class="movie-card" href="/movie/${m.id}" onclick="openMovie('${m.id}'); return false;">
          ${m.poster ? `<img class="movie-poster" src="${m.poster}" alt="${getChineseTitle(m)}">` : '<div style="aspect-ratio:2/3;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;font-size:2rem;color:rgba(255,255,255,0.08);">🎬</div>'}
          <div class="movie-tags">
            <span class="tag ${m.type === 'movie' ? 'tag-movie' : 'tag-tv'}">${m.type === 'movie' ? '电影' : '剧集'}</span>
          </div>
          ${parseFloat(m.tmdb_rating) > 0 ? `<div class="movie-rating-badge"><span class="star">★</span>${m.tmdb_rating}</div>` : ''}
          ${m.year ? `<div class="movie-year-badge" style="background:${getYearColor(m.year).bg};border-color:${getYearColor(m.year).border}">${m.year}</div>` : ''}
          <div class="movie-card-title">${getChineseTitle(m).replace(/第[一二三四五六七八九十]+季/, '').trim()}</div>
        </a>
      `).join('');

      let filters = [];
      if (window.currentType !== 'all') filters.push(window.currentType === 'movie' ? '电影' : '剧集');
      if (window.currentGenre !== 'all') filters.push(translateGenre(window.currentGenre));
      if (window.currentYear !== 'all') filters.push(window.currentYear);
      let statsText = filters.length > 0 ? '筛选: ' + filters.join(' + ') + ' | ' : '';
      document.getElementById('stats').textContent = `${statsText}共 ${filtered.length} 部`;
    }

    async function openMovie(id) {
      try {
        const resp = await fetch(`${API_BASE}/api/movies/${id}`);
        const data = await resp.json();
        const m = data.movie;
        if (!m) return;

        currentMovie = m;

        history.pushState({ id }, '', `/movie/${id}`);

        if (m.poster) {
          document.getElementById('detailPoster').src = m.poster;
          document.getElementById('detailPoster').style.display = 'block';
        } else {
          document.getElementById('detailPoster').style.display = 'none';
        }

        document.getElementById('detailTitle').textContent = getChineseTitle(m).replace(/第[一二三四五六七八九十]+季/, '').trim();
        const titleEnEl = document.getElementById('detailTitleEn');
        const englishTitle = m.title_en || (m.title !== getChineseTitle(m) ? m.title : '');
        if (englishTitle) {
          titleEnEl.textContent = englishTitle;
          titleEnEl.style.display = 'block';
        } else {
          titleEnEl.style.display = 'none';
        }
        document.getElementById('detailYear').textContent = m.release_date || m.year || '';
        document.getElementById('detailRegion').textContent = m.region || '';

        // Ratings from multiple sources
        // Ratings section hidden

        const genreTags = document.getElementById('detailGenreTags');
        if (m.genre) {
          // Split by comma or slash
          const genres = m.genre.split(/[,/]/).map(g => g.trim()).filter(g => g);
          genreTags.innerHTML = genres.map(g => {
            const cn = translateGenre(g);
            return `<a href="#" class="detail-genre-tag" onclick="filterByGenre('${g}'); return false;">${cn}</a>`;
          }).join('');
        } else {
          genreTags.innerHTML = '';
        }

        // Director & Cast - simplified text only, separate lines
        const crewInline = document.getElementById('detailCrewInline');
        const crewList = document.getElementById('detailCrewList');
        let crewHtml = '';
        
        if (m.director) {
          crewHtml += `<div class="detail-crew-item"><span class="detail-crew-role">导演</span><span class="detail-crew-name">${m.director}</span></div>`;
        }
        
        if (m.cast) {
          crewHtml += `<div class="detail-crew-item"><span class="detail-crew-role">主演</span><span class="detail-crew-name">${m.cast}</span></div>`;
        }
        
        if (crewHtml) {
          crewList.innerHTML = crewHtml;
          crewInline.style.display = 'block';
        } else {
          crewInline.style.display = 'none';
        }

        // Full intro - fetch from Douban for Chinese content
        const introEl = document.getElementById('detailFullIntro');
        if (m.intro && !/[一-龥]/.test(m.intro) && m.douban_id) {
          // Intro is English and we have Douban ID, fetch Chinese intro
          introEl.textContent = '加载中...';
          fetch(`https://api.douban.com/v2/movie/subject/${m.douban_id}`, {
            headers: { 'User-Agent': 'Mozilla/5.0' }
          })
            .then(r => r.json())
            .then(data => {
              introEl.textContent = data.summary || m.intro || '暂无简介';
            })
            .catch(() => {
              introEl.textContent = m.intro || '暂无简介';
            });
        } else {
          introEl.textContent = m.intro || '暂无简介';
        }

        // Season selector - only for TV shows
        const seasonSection = document.getElementById('seasonSelectorSection');
        const seasonSelector = document.getElementById('seasonSelector');
        
        if (m.type !== 'tv') {
          seasonSection.style.display = 'none';
        } else {
          const cleanTitle = getChineseTitle(m).replace(/第[一二三四五六七八九十]+季/, '').trim();
          const currentSeason = m.title_cn.match(/第([一二三四五六七八九十]+)季/)?.[1] || '1';
          
          fetch(`${API_BASE}/api/movies`)
            .then(r => r.json())
            .then(data => {
              const allSeasons = [{ id: m.id, season: currentSeason }];
              const relatedMovies = (data.movies || []).filter(other => {
                if (other.id === m.id) return false;
                const otherClean = (other.title_cn || other.titleCn || other.title).replace(/第[一二三四五六七八九十]+季/, '').trim();
                return otherClean === cleanTitle && other.type === m.type;
              });
              
              relatedMovies.forEach(other => {
                const otherSeason = other.title_cn.match(/第([一二三四五六七八九十]+)季/)?.[1] || '';
                if (otherSeason) allSeasons.push({ id: other.id, season: otherSeason });
              });
              
              // Sort by season number
              const seasonOrder = ['一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];
              allSeasons.sort((a, b) => {
                const aIdx = seasonOrder.indexOf(a.season);
                const bIdx = seasonOrder.indexOf(b.season);
                return (aIdx === -1 ? 99 : aIdx) - (bIdx === -1 ? 99 : bIdx);
              });
              
              let seasonHtml = '';
              allSeasons.forEach(s => {
                const isActive = s.id === m.id;
                seasonHtml += `<a href="/movie/${s.id}" class="season-tag ${isActive ? 'active' : ''}">第${s.season}季</a>`;
              });
              seasonSelector.innerHTML = seasonHtml;
              seasonSection.style.display = 'block';
            })
            .catch(() => {
              seasonSection.style.display = 'none';
            });
        }

        const linksEl = document.getElementById('detailLinks');
        let linksHtml = '';

        if (m.douban_id) {
          linksHtml += `<a href="https://movie.douban.com/subject/${m.douban_id}/" target="_blank" class="detail-link detail-link-douban">🍅 豆瓣${m.rating ? ' ' + m.rating : ''}</a>`;
        }

        if (m.tmdb_id) {
          linksHtml += `<a href="https://www.themoviedb.org/movie/${m.tmdb_id}" target="_blank" class="detail-link detail-link-tmdb">🎬 TMDB${m.tmdb_rating ? ' ' + m.tmdb_rating : ''}</a>`;
        }

        if (m.imdb_id) {
          linksHtml += `<a href="https://www.imdb.com/title/${m.imdb_id}" target="_blank" class="detail-link detail-link-imdb">🎞️ IMDb${m.imdb_rating ? ' ' + m.imdb_rating : ''}</a>`;
        }

        linksEl.innerHTML = linksHtml;

        const resourcesEl = document.getElementById('detailResources');
        const searchTitle = m.title_cn || m.title;

        const validResources = (m.resources || []).filter(r => r.status !== 'expired');
        const expiredCount = (m.resources || []).filter(r => r.status === 'expired').length;

        function renderStoredResources(resources) {
          if (!resources || resources.length === 0) {
            return `<div class="no-resource">暂无有效资源，点击下方按钮搜索</div>`;
          }
          return resources.map(r => {
            const isAli = r.url.includes('aliyundrive') || r.url.includes('alipan');
            const icon = isAli ? '☁️' : '📁';
            const sourceLabel = isAli ? '阿里云盘' : '139云盘';
            return `
              <div class="resource-item">
                <a href="${r.url}" target="_blank" class="resource-link">
                  <span>${icon}</span>
                  <span class="resource-url" title="${r.url}">${sourceLabel} - ${r.url.substring(0, 40)}...</span>
                </a>
                <button class="btn-delete" onclick="deleteResource('${m.id}', ${r.id})">删除</button>
              </div>
            `;
          }).join('');
        }

        function renderSearchButtons() {
          const encodedTitle = encodeURIComponent(searchTitle);
          const expiredHtml = expiredCount > 0 ? `
            <div style="padding:8px 12px;background:rgba(239,68,68,0.1);border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
              <span style="color:#ef4444;font-size:0.8rem;">⚠️ ${expiredCount} 个失效资源</span>
              <button onclick="clearExpiredResources('${m.id}')" style="padding:4px 8px;background:#ef4444;color:#fff;border:none;border-radius:4px;font-size:0.75rem;cursor:pointer;">清理</button>
            </div>
          ` : '';
          return `
            ${expiredHtml}
            <div class="resources-header">
              <span class="resources-count">${validResources.length} 个有效资源</span>
              <button class="btn-refresh" id="searchResourcesBtn" onclick="refreshResources('${m.id}')">
                🔍 搜索资源
              </button>
            </div>
            <div class="resource-external-links" style="margin-top:8px;display:flex;flex-direction:column;gap:6px;">
              <a href="https://91panta.cn/search?keyword=${encodedTitle}" target="_blank" class="resource-link" style="font-size:0.75rem;">
                <span>🌐</span>
                <span class="resource-url">91panta 搜索</span>
              </a>
              <a href="https://www.google.com/search?q=site:yun.139.com/shareweb+${encodedTitle}" target="_blank" class="resource-link" style="font-size:0.75rem;">
                <span>🌐</span>
                <span class="resource-url">Google 139云</span>
              </a>
              <a href="https://www.google.com/search?q=site:www.aliyundrive.com+${encodedTitle}" target="_blank" class="resource-link" style="font-size:0.75rem;">
                <span>🌐</span>
                <span class="resource-url">阿里云盘</span>
              </a>
            </div>
          `;
        }

        resourcesEl.innerHTML = renderStoredResources(validResources) + renderSearchButtons();
        resourcesEl.dataset.movieId = m.id;

        document.getElementById('homePage').style.display = 'none';
        document.getElementById('detailPage').classList.add('active');
        window.scrollTo(0, 0);

      } catch (e) {
        console.error('加载详情失败:', e);
      }
    }

    function shareMovie() {
      if (!currentMovie) return;
      const title = currentMovie.titleCn || currentMovie.title;
      const url = location.href;
      if (navigator.share) {
        navigator.share({ title, text: `${title} - 影视库`, url }).catch(() => {});
      } else {
        navigator.clipboard.writeText(url).then(() => showToast('链接已复制'));
      }
    }

    async function deleteResource(movieId, resourceId) {
      // 乐观更新：立即动画删除
      const item = document.querySelector(`[data-resource-id="${resourceId}"]`);
      if (item) {
        item.style.transition = 'all 0.3s ease';
        item.style.opacity = '0';
        item.style.transform = 'translateX(20px)';
        item.style.maxHeight = '0';
        item.style.marginBottom = '0';
        item.style.padding = '0';
        setTimeout(() => item.remove(), 300);
      }
      
      // 更新数量
      const countEl = document.querySelector('.resources-count');
      if (countEl) {
        const current = parseInt(countEl.textContent) || 1;
        countEl.textContent = `${current - 1} 个链接`;
      }
      
      try {
        await fetch(`${API_BASE}/api/resources/${resourceId}`, {
          method: 'DELETE'
        });
      } catch (e) {
        await openMovie(movieId);
      }
    }

    async function clearExpiredResources(movieId) {
      try {
        const resp = await fetch(`${API_BASE}/api/movies/${movieId}/resources/expired`, {
          method: 'DELETE'
        });
        const data = await resp.json();
        showToast(`已清理 ${data.deleted} 个失效资源`);
        await openMovie(movieId);
      } catch (e) {
        showToast('清理失败');
      }
    }

    async function refreshResources(movieId) {
      const btn = document.querySelector('.btn-refresh');
      if (btn) {
        btn.textContent = '清理中...';
        btn.disabled = true;
      }

      try {
        await fetch(`${API_BASE}/api/movies/${movieId}/resources/expired`, { method: 'DELETE' });

        if (btn) btn.textContent = '搜索中...';

        const resp = await fetch(`${API_BASE}/api/movies/${movieId}/resources`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });

        const data = await resp.json();
        const validCount = data.valid_resources || 0;
        showToast(`找到 ${validCount} 个有效资源`);
        await openMovie(movieId);
      } catch (e) {
        showToast('搜索失败');
      }

      if (btn) {
        btn.disabled = false;
        btn.textContent = '🔍 搜索资源';
      }
    }

    window.addEventListener('popstate', (e) => {
      if (e.state && e.state.id) {
        openMovie(e.state.id);
      } else {
        goHome();
      }
    });

    function handleRoute() {
      const path = location.pathname;
      const match = path.match(/^\/movie\/(.+)$/);
      if (match) {
        openMovie(match[1]);
      } else {
        goHome();
      }
    }

    // 点击空白处关闭下拉菜单
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.filter-dropdown-wrapper')) {
        document.getElementById('typeDropdown').classList.remove('active');
        document.getElementById('genreDropdown').classList.remove('active');
        document.getElementById('yearDropdown').classList.remove('active');
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') collapseSearch();
    });

    // 初始化
    loadMovies();
    handleRoute();

    // 添加电影
    function openAddModal() {
      document.getElementById('addModal').classList.add('active');
      document.getElementById('doubanUrlInput').focus();
    }

    function closeAddModal() {
      document.getElementById('addModal').classList.remove('active');
      document.getElementById('doubanUrlInput').value = '';
      document.getElementById('movieNameInput').value = '';
      document.getElementById('addSubmitBtn').disabled = false;
      document.getElementById('addSubmitBtn').textContent = '添加到影视库';
    }

    async function submitAddMovie(e) {
      e.preventDefault();
      const doubanUrl = document.getElementById('doubanUrlInput').value;
      const searchQuery = document.getElementById('movieNameInput').value;
      const btn = document.getElementById('addSubmitBtn');
      
      btn.disabled = true;
      btn.textContent = '添加中...';
      
      try {
        const resp = await fetch(`${API_BASE}/api/movies`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ doubanUrl, searchQuery })
        });
        
        const data = await resp.json();
        
        if (!resp.ok) {
          throw new Error(data.error || '添加失败');
        }
        
        if (data.status === 'already_exists') {
          showToast('电影已存在');
        } else {
          showToast('添加成功！');
          await loadMovies();
        }
        
        closeAddModal();
      } catch (err) {
        showToast(err.message);
        btn.disabled = false;
        btn.textContent = '添加到影视库';
      }
    }

    // 点击弹窗背景关闭
    document.getElementById('addModal').addEventListener('click', (e) => {
      if (e.target.id === 'addModal') closeAddModal();
    });
  </script>
</body>
</html>
