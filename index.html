<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>影视库</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <style>
    :root {
      --bg-primary: #f5f5f7;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #1d1d1f;
      --text-secondary: #86868b;
      --text-tertiary: #acacb0;
      --border-color: rgba(0,0,0,0.08);
      --accent: #667eea;
      --accent-hover: #5a6fd6;
      --tag-movie: #007aff;
      --tag-tv: #af52de;
      --tag-resource: #34c759;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
    }

    [data-theme="dark"] {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a24;
      --text-primary: #e0e0e0;
      --text-secondary: #888888;
      --text-tertiary: #555555;
      --border-color: rgba(255,255,255,0.08);
      --accent: #667eea;
      --accent-hover: #7c8ff5;
      --shadow: 0 4px 20px rgba(0,0,0,0.3);
      --shadow-hover: 0 8px 30px rgba(0,0,0,0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      pointer-events: none;
      z-index: -1;
    }

    /* 顶部导航栏 */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--bg-secondary);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      gap: 16px;
      transition: background 0.3s ease;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text-primary);
    }

    .logo-icon {
      font-size: 1.3rem;
    }

    .logo-text {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .filters {
      display: flex;
      gap: 6px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .filters.search-active {
      opacity: 0;
      transform: translateX(20px);
      pointer-events: none;
    }

    .filter-btn {
      padding: 7px 14px;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-secondary);
      border-radius: 18px;
      cursor: pointer;
      font-size: 0.78rem;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--text-primary);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .search-wrapper {
      position: relative;
    }

    .search-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.25s ease;
    }

    .search-icon:hover {
      border-color: var(--accent);
    }

    .search-expanded {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%) scale(0.9);
      width: 240px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search-expanded.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(-50%) scale(1);
    }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 8px 12px;
      gap: 8px;
      box-shadow: var(--shadow);
    }

    .search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 0.85rem;
    }

    .search-box input::placeholder {
      color: var(--text-tertiary);
    }

    .search-close {
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 0.75rem;
      transition: color 0.2s;
    }

    .search-close:hover {
      color: var(--text-primary);
    }

    /* 主题切换 */
    .theme-toggle {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.25s ease;
    }

    .theme-toggle:hover {
      border-color: var(--accent);
    }

    /* 影视网格 */
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
      padding: 20px;
      padding-bottom: 70px;
      max-width: 1600px;
      margin: 0 auto;
    }

    @media (min-width: 640px) {
      .movies-grid {
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
        gap: 20px;
        padding: 24px;
        padding-bottom: 70px;
      }
    }

    /* 影视卡片 */
    .movie-card {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      box-shadow: var(--shadow);
    }

    .movie-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .movie-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
    }

    .movie-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 10px;
    }

    .movie-card:hover .movie-overlay {
      opacity: 1;
    }

    .movie-title-overlay {
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.3;
      color: #fff;
    }

    .movie-meta-overlay {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.8);
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .movie-year {
      color: #a78bfa;
    }

    .movie-rating .star {
      color: #fbbf24;
    }

    /* 标签 */
    .movie-tags {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 4px;
    }

    .tag {
      padding: 2px 7px;
      border-radius: 8px;
      font-size: 0.58rem;
      font-weight: 500;
      color: #fff;
    }

    .tag-movie { background: var(--tag-movie); }
    .tag-tv { background: var(--tag-tv); }
    .tag-resource { background: var(--tag-resource); }

    /* 电影标题 */
    .movie-card-title {
      padding: 10px 6px 8px;
      font-size: 0.75rem;
      color: var(--text-primary);
      text-align: center;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 统计 */
    .stats {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 12px;
      color: var(--text-tertiary);
      font-size: 0.72rem;
      background: var(--bg-secondary);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border-color);
      z-index: 50;
    }

    /* 空状态 */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 14px;
      opacity: 0.3;
    }

    .empty-state h2 {
      font-size: 0.95rem;
      font-weight: 400;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }

    /* ========== 详情页 ========== */
    .detail-page {
      display: none;
      min-height: 100vh;
    }

    .detail-page.active {
      display: block;
    }

    .detail-header {
      position: relative;
      padding: 60px 24px 24px;
      text-align: center;
    }

    .detail-back {
      position: absolute;
      left: 20px;
      top: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 8px 14px;
      border-radius: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      transition: all 0.25s ease;
    }

    .detail-back:hover {
      border-color: var(--accent);
      color: var(--text-primary);
    }

    .detail-share {
      position: absolute;
      right: 20px;
      top: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      font-size: 0.85rem;
      padding: 8px 14px;
      border-radius: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .detail-share:hover {
      border-color: var(--accent);
      color: var(--text-primary);
    }

    .detail-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    .detail-main {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 28px;
      margin-bottom: 28px;
    }

    @media (max-width: 600px) {
      .detail-main {
        grid-template-columns: 1fr;
        text-align: center;
      }
    }

    .detail-poster {
      width: 100%;
      border-radius: 12px;
      aspect-ratio: 2/3;
      object-fit: cover;
      box-shadow: var(--shadow);
    }

    .detail-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .detail-title {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .detail-meta {
      display: flex;
      gap: 16px;
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .detail-rating {
      color: #f4a523;
      font-weight: 500;
    }

    .detail-genre {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .detail-genre-tag {
      padding: 4px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .detail-intro {
      color: var(--text-secondary);
      line-height: 1.7;
      font-size: 0.9rem;
    }

    .detail-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .detail-link {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 0.8rem;
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .detail-link-douban {
      background: rgba(0, 180, 60, 0.1);
      border: 1px solid rgba(0, 180, 60, 0.25);
      color: #00b43c;
    }

    .detail-link-douban:hover {
      background: rgba(0, 180, 60, 0.2);
    }

    .detail-link-tmdb {
      background: rgba(135, 163, 232, 0.1);
      border: 1px solid rgba(135, 163, 232, 0.25);
      color: #87a3e8;
    }

    .detail-link-tmdb:hover {
      background: rgba(135, 163, 232, 0.2);
    }

    .detail-link-imdb {
      background: rgba(244, 203, 87, 0.1);
      border: 1px solid rgba(244, 203, 87, 0.25);
      color: #d4a835;
    }

    .detail-link-imdb:hover {
      background: rgba(244, 203, 87, 0.2);
    }

    .detail-section {
      margin-bottom: 24px;
    }

    .detail-section-title {
      font-size: 0.7rem;
      color: var(--text-tertiary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .resource-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .resource-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 10px;
      color: #10b981;
      text-decoration: none;
      font-size: 0.82rem;
      transition: all 0.25s ease;
    }

    .resource-link:hover {
      background: rgba(16, 185, 129, 0.15);
      border-color: rgba(16, 185, 129, 0.35);
    }

    .no-resource {
      padding: 16px;
      background: var(--bg-card);
      border: 1px dashed var(--border-color);
      border-radius: 10px;
      color: var(--text-tertiary);
      font-size: 0.8rem;
      text-align: center;
    }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-card);
      border: 1px solid var(--accent);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      color: var(--text-primary);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 2000;
      box-shadow: var(--shadow);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <!-- 首页 -->
  <div class="home-page" id="homePage">
    <div class="topbar">
      <div class="topbar-left">
        <a href="/" class="logo" onclick="goHome(); return false;">
          <span class="logo-icon">🎬</span>
          <span class="logo-text">影视库</span>
        </a>
      </div>
      <div class="topbar-right">
        <div class="filters" id="filters">
          <button class="filter-btn active" data-filter="all">全部</button>
          <button class="filter-btn" data-filter="movie">电影</button>
          <button class="filter-btn" data-filter="tv">剧集</button>
          <button class="filter-btn" data-filter="has-resource">可播放</button>
        </div>
        <div class="search-wrapper">
          <div class="search-icon" onclick="expandSearch()">🔍</div>
          <div class="search-expanded" id="searchExpanded">
            <div class="search-box">
              <span>🔍</span>
              <input type="text" id="searchInput" placeholder="搜索..." oninput="renderMovies()">
              <span class="search-close" onclick="collapseSearch()">✕</span>
            </div>
          </div>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">🌙</button>
      </div>
    </div>

    <div class="movies-grid" id="moviesGrid"></div>
    <div class="stats" id="stats"></div>
  </div>

  <!-- 详情页 -->
  <div class="detail-page" id="detailPage">
    <div class="detail-header">
      <a href="/" class="detail-back" onclick="goHome(); return false;">← 返回</a>
      <button class="detail-share" onclick="shareMovie()">分享 ↗</button>
    </div>
    <div class="detail-content">
      <div class="detail-main">
        <img class="detail-poster" id="detailPoster" src="" alt="">
        <div class="detail-info">
          <h1 class="detail-title" id="detailTitle"></h1>
          <div class="detail-meta">
            <span id="detailYear"></span>
            <span class="detail-rating" id="detailRating"></span>
            <span id="detailGenre"></span>
          </div>
          <div class="detail-genre" id="detailGenreTags"></div>
          <p class="detail-intro" id="detailIntro"></p>
        </div>
      </div>
      <div class="detail-links" id="detailLinks"></div>
      <div class="detail-section">
        <div class="detail-section-title">资源链接</div>
        <div class="resource-links" id="detailResources"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = 'https://media-library-api.jemchmi.workers.dev';
    let movies = [];
    let currentFilter = 'all';
    let currentMovie = null;

    // 主题
    function getTheme() {
      return localStorage.getItem('theme') || 'light';
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    function toggleTheme() {
      const current = getTheme();
      setTheme(current === 'dark' ? 'light' : 'dark');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function expandSearch() {
      document.getElementById('searchExpanded').classList.add('active');
      document.querySelector('.search-icon').style.display = 'none';
      document.getElementById('filters').classList.add('search-active');
    }

    function collapseSearch() {
      document.getElementById('searchExpanded').classList.remove('active');
      document.querySelector('.search-icon').style.display = 'flex';
      document.getElementById('filters').classList.remove('search-active');
      document.getElementById('searchInput').value = '';
      renderMovies();
    }

    function goHome() {
      document.getElementById('homePage').style.display = 'block';
      document.getElementById('detailPage').classList.remove('active');
      window.scrollTo(0, 0);
      history.pushState(null, '', '/');
    }

    async function loadMovies() {
      try {
        const response = await fetch(`${API_BASE}/api/movies`);
        const data = await response.json();
        movies = data.movies || [];
        renderMovies();
      } catch (e) {
        console.error('加载数据失败:', e);
      }
    }

    function renderMovies() {
      const grid = document.getElementById('moviesGrid');
      const search = document.getElementById('searchInput').value.toLowerCase();
      
      let filtered = movies.filter(m => {
        if (currentFilter === 'movie' && m.type !== 'movie') return false;
        if (currentFilter === 'tv' && m.type !== 'tv') return false;
        if (currentFilter === 'has-resource' && (!m.resources || m.resources.length === 0)) return false;
        if (search && !(m.titleCn || '').toLowerCase().includes(search) && !m.title.toLowerCase().includes(search)) return false;
        return true;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🎬</div>
            <h2>暂无内容</h2>
            <p>发送豆瓣链接给 Coraline 添加影视</p>
          </div>
        `;
        document.getElementById('stats').textContent = '';
        return;
      }

      grid.innerHTML = filtered.map(m => `
        <a class="movie-card" href="/movie/${m.id}" onclick="openMovie('${m.id}'); return false;">
          ${m.poster ? `<img class="movie-poster" src="${m.poster}" alt="${m.titleCn || m.title}">` : '<div style="aspect-ratio:2/3;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;font-size:2rem;color:rgba(255,255,255,0.08);">🎬</div>'}
          <div class="movie-tags">
            <span class="tag ${m.type === 'movie' ? 'tag-movie' : 'tag-tv'}">${m.type === 'movie' ? '电影' : '剧集'}</span>
            ${m.resources && m.resources.length > 0 ? '<span class="tag tag-resource">▶</span>' : ''}
          </div>
          <div class="movie-card-title">${m.titleCn || m.title}</div>
          <div class="movie-overlay">
            <h3 class="movie-title-overlay">${m.titleCn || m.title}</h3>
            <div class="movie-meta-overlay">
              <span class="movie-year">${m.year || ''}</span>
              ${m.rating ? `<span class="movie-rating"><span class="star">★</span>${m.rating}</span>` : ''}
            </div>
          </div>
        </a>
      `).join('');

      document.getElementById('stats').textContent = `共 ${filtered.length} 部`;
    }

    async function openMovie(id) {
      try {
        const resp = await fetch(`${API_BASE}/api/movies/${id}`);
        const data = await resp.json();
        const m = data.movie;
        if (!m) return;

        currentMovie = m;

        history.pushState({ id }, '', `/movie/${id}`);

        if (m.poster) {
          document.getElementById('detailPoster').src = m.poster;
          document.getElementById('detailPoster').style.display = 'block';
        } else {
          document.getElementById('detailPoster').style.display = 'none';
        }

        document.getElementById('detailTitle').textContent = m.titleCn || m.title;
        document.getElementById('detailYear').textContent = m.year || '';
        document.getElementById('detailRating').innerHTML = m.rating ? `<span class="star">★</span> ${m.rating}` : '';
        document.getElementById('detailGenre').textContent = m.genre || '';

        const genreTags = document.getElementById('detailGenreTags');
        if (m.genre) {
          genreTags.innerHTML = m.genre.split(' / ').map(g => `<span class="detail-genre-tag">${g}</span>`).join('');
        } else {
          genreTags.innerHTML = '';
        }

        document.getElementById('detailIntro').textContent = m.intro || '暂无简介';

        const linksEl = document.getElementById('detailLinks');
        let linksHtml = '';

        if (m.doubanUrl) {
          linksHtml += `<a href="${m.doubanUrl}" target="_blank" class="detail-link detail-link-douban">🍅 豆瓣</a>`;
        }

        if (m.tmdbId) {
          linksHtml += `<a href="https://www.themoviedb.org/movie/${m.tmdbId}" target="_blank" class="detail-link detail-link-tmdb">🎬 TMDB</a>`;
        }

        if (m.imdbId) {
          linksHtml += `<a href="https://www.imdb.com/title/${m.imdbId}" target="_blank" class="detail-link detail-link-imdb">🎞️ IMDb</a>`;
        }

        linksEl.innerHTML = linksHtml;

        const resourcesEl = document.getElementById('detailResources');
        if (m.resources && m.resources.length > 0) {
          resourcesEl.innerHTML = m.resources.map(r => `
            <a href="${r.url}" target="_blank" class="resource-link">
              <span>📁</span>
              <span>${r.name || '资源链接'}</span>
            </a>
          `).join('');
        } else {
          resourcesEl.innerHTML = '<div class="no-resource">暂无资源链接</div>';
        }

        document.getElementById('homePage').style.display = 'none';
        document.getElementById('detailPage').classList.add('active');
        window.scrollTo(0, 0);

      } catch (e) {
        console.error('加载详情失败:', e);
      }
    }

    function shareMovie() {
      if (!currentMovie) return;
      const title = currentMovie.titleCn || currentMovie.title;
      const url = location.href;
      if (navigator.share) {
        navigator.share({ title, text: `${title} - 影视库`, url }).catch(() => {});
      } else {
        navigator.clipboard.writeText(url).then(() => showToast('链接已复制'));
      }
    }

    window.addEventListener('popstate', (e) => {
      if (e.state && e.state.id) {
        openMovie(e.state.id);
      } else {
        goHome();
      }
    });

    function handleRoute() {
      const path = location.pathname;
      const match = path.match(/^\/movie\/(\d+)$/);
      if (match) {
        openMovie(match[1]);
      } else {
        goHome();
      }
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderMovies();
      });
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') collapseSearch();
    });

    // 初始化
    setTheme(getTheme());
    loadMovies();
    handleRoute();
  </script>
</body>
</html>
