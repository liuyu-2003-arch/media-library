<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>影视库</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* 背景效果 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(59, 130, 246, 0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    /* 顶部导航栏 */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: rgba(10, 10, 15, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      font-size: 1.5rem;
    }

    .logo-text {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      background: linear-gradient(135deg, #fff 0%, #a78bfa 50%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-sub {
      font-size: 0.65rem;
      color: #555;
      letter-spacing: 0.15em;
      display: none;
    }

    @media (min-width: 768px) {
      .logo-sub {
        display: block;
      }
    }

    /* 搜索 */
    .search-wrapper {
      position: relative;
    }

    .search-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .search-icon:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
    }

    .search-expanded {
      position: absolute;
      right: 0;
      top: 0;
      width: 280px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .search-expanded.active {
      opacity: 1;
      pointer-events: auto;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(139, 92, 246, 0.4);
      border-radius: 12px;
      padding: 10px 14px;
      gap: 10px;
      box-shadow: 0 0 30px rgba(139, 92, 246, 0.15);
    }

    .search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #e0e0e0;
      font-size: 0.9rem;
    }

    .search-box input::placeholder {
      color: #555;
    }

    .search-close {
      cursor: pointer;
      color: #666;
      font-size: 0.8rem;
    }

    /* 筛选栏 */
    .filters {
      display: flex;
      gap: 8px;
      padding: 16px 24px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .filter-btn {
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: #666;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .filter-btn:hover {
      border-color: rgba(255,255,255,0.15);
      color: #aaa;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2));
      border-color: rgba(139, 92, 246, 0.4);
      color: #fff;
    }

    /* 影视网格 */
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
      padding: 20px 24px;
      max-width: 1600px;
      margin: 0 auto;
    }

    @media (min-width: 768px) {
      .movies-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 24px;
        padding: 24px;
      }
    }

    /* 影视卡片 */
    .movie-card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.4s ease;
      cursor: pointer;
    }

    .movie-card:hover {
      transform: translateY(-4px);
      border-color: rgba(139, 92, 246, 0.3);
      box-shadow: 
        0 12px 40px rgba(0,0,0,0.4),
        0 0 40px rgba(139, 92, 246, 0.1);
    }

    .movie-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
    }

    .movie-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 12px;
    }

    .movie-card:hover .movie-overlay {
      opacity: 1;
    }

    .movie-title {
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.3;
    }

    .movie-meta {
      font-size: 0.7rem;
      color: #888;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .movie-year {
      color: #a78bfa;
    }

    .movie-rating {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .movie-rating .star {
      color: #fbbf24;
    }

    /* 标签 */
    .movie-tags {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tag {
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    .tag-movie {
      background: rgba(59, 130, 246, 0.8);
    }

    .tag-tv {
      background: rgba(168, 85, 247, 0.8);
    }

    .tag-resource {
      background: rgba(16, 185, 129, 0.85);
    }

    /* 资源链接指示器 */
    .resource-indicator {
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(16, 185, 129, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
    }

    /* 弹窗 */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(20px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: linear-gradient(145deg, #12121a, #0a0a0f);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      max-width: 800px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: none;
      color: #888;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      z-index: 10;
    }

    .modal-close:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .modal-body {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 24px;
    }

    @media (max-width: 600px) {
      .modal-body {
        grid-template-columns: 1fr;
      }
    }

    .modal-poster {
      width: 100%;
      border-radius: 12px;
      aspect-ratio: 2/3;
      object-fit: cover;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
    }

    .modal-info {
      padding: 16px 16px 16px 0;
    }

    @media (max-width: 600px) {
      .modal-info {
        padding: 0 16px 16px;
      }
    }

    .modal-title {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .modal-meta {
      display: flex;
      gap: 16px;
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .modal-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .modal-rating {
      color: #fbbf24;
    }

    .modal-section {
      margin-bottom: 16px;
    }

    .modal-section h3 {
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .modal-intro {
      color: #888;
      line-height: 1.6;
      font-size: 0.85rem;
    }

    .resource-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .resource-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 10px;
      color: #10b981;
      text-decoration: none;
      font-size: 0.8rem;
      transition: all 0.3s ease;
    }

    .resource-link:hover {
      background: rgba(16, 185, 129, 0.15);
      border-color: rgba(16, 185, 129, 0.4);
    }

    .no-resource {
      padding: 16px;
      background: rgba(255,255,255,0.02);
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #555;
      font-size: 0.8rem;
      text-align: center;
    }

    /* 统计 */
    .stats {
      text-align: center;
      padding: 16px;
      color: #444;
      font-size: 0.75rem;
    }

    /* 空状态 */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: #333;
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-state h2 {
      font-size: 1rem;
      font-weight: 400;
      margin-bottom: 8px;
      color: #444;
    }

    .empty-state p {
      font-size: 0.8rem;
    }

    /* 滚动条 */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">
      <span class="logo-icon">🎬</span>
      <div>
        <div class="logo-text">影视库</div>
        <div class="logo-sub">MOVIE & TV</div>
      </div>
    </div>
    <div class="search-wrapper">
      <div class="search-icon" onclick="expandSearch()">🔍</div>
      <div class="search-expanded" id="searchExpanded">
        <div class="search-box">
          <span>🔍</span>
          <input type="text" id="searchInput" placeholder="搜索影视名称..." oninput="renderMovies()">
          <span class="search-close" onclick="collapseSearch()">✕</span>
        </div>
      </div>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="movie">电影</button>
    <button class="filter-btn" data-filter="tv">剧集</button>
    <button class="filter-btn" data-filter="has-resource">可播放</button>
  </div>

  <div class="movies-grid" id="moviesGrid"></div>
  <div class="stats" id="stats"></div>

  <!-- 详情弹窗 -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-body">
        <img class="modal-poster" id="modalPoster" src="" alt="">
        <div class="modal-info">
          <h2 class="modal-title" id="modalTitle"></h2>
          <div class="modal-meta">
            <span id="modalYear"></span>
            <span id="modalGenre"></span>
            <span class="modal-rating" id="modalRating"></span>
            <span id="modalType"></span>
          </div>
          <div class="modal-section">
            <h3>简介</h3>
            <p class="modal-intro" id="modalIntro"></p>
          </div>
          <div class="modal-section">
            <h3>资源链接</h3>
            <div class="resource-links" id="modalResources"></div>
          </div>
          <div class="modal-section">
            <h3>豆瓣</h3>
            <a id="modalDouban" href="" target="_blank" style="color:#a78bfa;font-size:0.8rem;"></a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://media-library-api.jemchmi.workers.dev';
    let movies = [];
    let currentFilter = 'all';

    function expandSearch() {
      document.getElementById('searchExpanded').classList.add('active');
      document.querySelector('.search-icon').style.display = 'none';
      document.getElementById('searchInput').focus();
    }

    function collapseSearch() {
      document.getElementById('searchExpanded').classList.remove('active');
      document.querySelector('.search-icon').style.display = 'flex';
      document.getElementById('searchInput').value = '';
      renderMovies();
    }

    async function loadMovies() {
      try {
        const response = await fetch(`${API_BASE}/api/movies`);
        const data = await response.json();
        movies = data.movies || [];
        renderMovies();
      } catch (e) {
        console.error('加载数据失败:', e);
      }
    }

    function renderMovies() {
      const grid = document.getElementById('moviesGrid');
      const search = document.getElementById('searchInput').value.toLowerCase();
      
      let filtered = movies.filter(m => {
        if (currentFilter === 'movie' && m.type !== 'movie') return false;
        if (currentFilter === 'tv' && m.type !== 'tv') return false;
        if (currentFilter === 'has-resource' && (!m.resources || m.resources.length === 0)) return false;
        if (search && !m.title.toLowerCase().includes(search) && !(m.titleCn || '').toLowerCase().includes(search)) return false;
        return true;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🎬</div>
            <h2>暂无内容</h2>
            <p>发送豆瓣链接给 Coraline 添加影视</p>
          </div>
        `;
        document.getElementById('stats').textContent = '';
        return;
      }

      grid.innerHTML = filtered.map(m => `
        <div class="movie-card" onclick="openModal('${m.id}')">
          ${m.poster ? `<img class="movie-poster" src="${m.poster}" alt="${m.titleCn || m.title}" onerror="this.style.display='none'">` : ''}
          <div class="movie-tags">
            <span class="tag ${m.type === 'movie' ? 'tag-movie' : 'tag-tv'}">${m.type === 'movie' ? '电影' : '剧集'}</span>
            ${m.resources && m.resources.length > 0 ? '<span class="tag tag-resource">▶</span>' : ''}
          </div>
          <div class="movie-overlay">
            <h3 class="movie-title">${m.titleCn || m.title}</h3>
            <div class="movie-meta">
              <span class="movie-year">${m.year || ''}</span>
              ${m.rating ? `<span class="movie-rating"><span class="star">★</span>${m.rating}</span>` : ''}
            </div>
          </div>
        </div>
      `).join('');

      document.getElementById('stats').textContent = `共 ${filtered.length} 部`;
    }

    async function openModal(id) {
      try {
        const resp = await fetch(`${API_BASE}/api/movies/${id}`);
        const data = await resp.json();
        const m = data.movie;
        if (!m) return;

        if (m.poster) {
          document.getElementById('modalPoster').src = m.poster;
          document.getElementById('modalPoster').style.display = 'block';
        } else {
          document.getElementById('modalPoster').style.display = 'none';
        }

        document.getElementById('modalTitle').textContent = m.titleCn || m.title;
        document.getElementById('modalYear').textContent = m.year || '';
        document.getElementById('modalGenre').textContent = m.genre || '';
        document.getElementById('modalRating').innerHTML = m.rating ? `<span class="star">★</span> ${m.rating}` : '';
        document.getElementById('modalType').textContent = m.type === 'movie' ? '电影' : '剧集';
        document.getElementById('modalIntro').textContent = m.intro || '暂无简介';
        document.getElementById('modalDouban').href = m.doubanUrl;
        document.getElementById('modalDouban').textContent = m.doubanUrl;

        const resourcesEl = document.getElementById('modalResources');
        if (m.resources && m.resources.length > 0) {
          resourcesEl.innerHTML = m.resources.map(r => `
            <a href="${r.url}" target="_blank" class="resource-link">
              <span>📁</span>
              <span>${r.name || '资源链接'}</span>
            </a>
          `).join('');
        } else {
          resourcesEl.innerHTML = '<div class="no-resource">暂无资源链接</div>';
        }

        document.getElementById('modal').classList.add('active');
      } catch (e) {
        console.error('加载详情失败:', e);
      }
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderMovies();
      });
    });

    loadMovies();
  </script>
</body>
</html>
